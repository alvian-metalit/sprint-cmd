<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sprint Command Center</title>
<meta name="description" content="Personal strategic execution tracker">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --surface3: #222233;
  --border: #2a2a3a;
  --border-hover: #ff6b35;
  --text: #e8e8f0;
  --text2: #9898aa;
  --text3: #6a6a7a;
  --accent: #ff6b35;
  --accent2: #ff9f1c;
  --green: #2ecc71;
  --red: #e74c3c;
  --blue: #3498db;
  --purple: #9b59b6;
  --cyan: #00d2ff;
  --font-ui: 'Outfit', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Container */
.container { max-width: 820px; margin: 0 auto; padding: 0 16px; }

/* Header */
.header { text-align: center; padding: 28px 20px 20px; position: relative; }
.header::after { content:''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60%; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
.header h1 { font-size: 1.9em; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; line-height: 1.2; }
.header-sub { font-family: var(--font-mono); color: var(--text2); font-size: 0.78em; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; transition: background 0.3s; }
.save-dot.saving { background: var(--accent2); animation: pulse 0.6s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* Tab Bar */
.tab-bar { display: flex; gap: 3px; margin: 16px 16px 0; background: var(--surface); border-radius: 12px; padding: 3px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; position: sticky; top: 0; z-index: 100; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { flex: 1; padding: 10px 6px; border: none; background: transparent; color: var(--text2); font-family: var(--font-ui); font-size: 0.82em; font-weight: 500; cursor: pointer; border-radius: 10px; transition: all 0.25s; white-space: nowrap; min-width: 0; }
.tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 600; }

/* Panels */
.panel { display: none; padding: 16px 0; animation: panelIn 0.25s ease; }
.panel.active { display: block; }
@keyframes panelIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; transition: border-color 0.25s; }
.card:hover { border-color: var(--border-hover); }
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
.card-title { font-size: 1.05em; font-weight: 700; flex: 1; min-width: 0; }

/* Tags */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 0.65em; font-weight: 600; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; cursor: default; border: 1px solid; }
.tag-critical { background: rgba(231,76,60,0.12); color: var(--red); border-color: rgba(231,76,60,0.25); }
.tag-high { background: rgba(255,107,53,0.12); color: var(--accent); border-color: rgba(255,107,53,0.25); }
.tag-medium { background: rgba(52,152,219,0.12); color: var(--blue); border-color: rgba(52,152,219,0.25); }
.tag-low { background: rgba(155,89,182,0.12); color: var(--purple); border-color: rgba(155,89,182,0.25); }
.tag-green { background: rgba(46,204,113,0.12); color: var(--green); border-color: rgba(46,204,113,0.25); }
.tag-cyan { background: rgba(0,210,255,0.12); color: var(--cyan); border-color: rgba(0,210,255,0.25); }
.tag-accent { background: rgba(255,107,53,0.12); color: var(--accent); border-color: rgba(255,107,53,0.25); }
.tag-accent2 { background: rgba(255,159,28,0.12); color: var(--accent2); border-color: rgba(255,159,28,0.25); }
.tag-muted { background: rgba(152,152,170,0.1); color: var(--text2); border-color: rgba(152,152,170,0.2); }
.tag-clickable { cursor: pointer; transition: all 0.2s; }
.tag-clickable:hover { filter: brightness(1.3); }

/* Progress Bar */
.pbar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }

/* Checklist */
.chk { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; user-select: none; -webkit-user-select: none; }
.chk:last-child { border-bottom: none; }
.chk-box { width: 17px; height: 17px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.chk-box.on { background: var(--green); border-color: var(--green); }
.chk-box.on::after { content: '✓'; color: var(--bg); font-size: 10px; font-weight: 700; }
.chk-label { font-size: 0.82em; color: var(--text); transition: all 0.15s; }
.chk-label.done { color: var(--text3); text-decoration: line-through; }

/* Alert Box */
.alert { background: rgba(231,76,60,0.07); border: 1px solid rgba(231,76,60,0.18); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
.alert-title { color: var(--red); font-weight: 700; font-size: 0.95em; margin-bottom: 10px; }
.alert-body { color: var(--text2); font-size: 0.85em; line-height: 1.85; white-space: pre-line; }

/* Tier Section */
.tier-head { font-size: 0.7em; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Proposal Item */
.prop { display: flex; gap: 12px; padding: 14px; background: var(--surface2); border-radius: 10px; margin-bottom: 8px; border-left: 3px solid transparent; transition: border-color 0.2s; }
.prop:hover { border-left-color: var(--accent); }
.prop-num { font-family: var(--font-mono); font-size: 1.3em; font-weight: 700; color: var(--accent); min-width: 30px; }
.prop-body { flex: 1; min-width: 0; }
.prop-title { font-weight: 600; font-size: 0.9em; margin-bottom: 3px; }
.prop-desc { font-size: 0.78em; color: var(--text2); line-height: 1.5; margin-bottom: 6px; }
.prop-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }

/* Timeline */
.tl { position: relative; padding-left: 22px; }
.tl::before { content:''; position:absolute; left:5px; top:0; bottom:0; width:2px; background:var(--border); }
.tl-item { position: relative; margin-bottom: 14px; padding: 12px 14px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--accent); }
.tl-item::before { content:''; position:absolute; left:-22px; top:18px; width:8px; height:8px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
.tl-day { font-family: var(--font-mono); font-size: 0.68em; color: var(--accent2); margin-bottom: 2px; }
.tl-title { font-weight: 600; font-size: 0.85em; }

/* 2-col Grid */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 480px) { .grid2 { grid-template-columns: 1fr; } }

/* Deliverable box */
.deliv { margin-top: 10px; padding: 8px 10px; background: var(--surface2); border-radius: 6px; font-size: 0.78em; }
.deliv b { color: var(--accent); }
.deliv span { color: var(--text2); }

/* Section label */
.sec-label { font-size: 0.7em; font-family: var(--font-mono); color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Meta line */
.meta { font-size: 0.7em; color: var(--text2); margin-top: 4px; font-family: var(--font-mono); }

/* Footer */
.footer { text-align: center; padding: 20px 16px 28px; border-top: 1px solid var(--border); margin-top: 20px; }
.footer-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; color: var(--text2); font-size: 0.7em; font-family: var(--font-mono); cursor: pointer; transition: all 0.2s; }
.footer-btn:hover { border-color: var(--red); color: var(--red); }
.footer-note { font-size: 0.6em; color: var(--text3); margin-top: 6px; }

/* Stat block inside card */
.stat-block { padding: 12px; background: var(--surface2); border-radius: 8px; }
.stat-label { font-weight: 600; font-size: 0.82em; margin-bottom: 4px; }

/* Add form */
.add-row { display: flex; gap: 6px; margin-top: 10px; }
.add-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-family: var(--font-ui); font-size: 0.8em; outline: none; }
.add-input:focus { border-color: var(--accent); }
.add-input::placeholder { color: var(--text3); }
.add-btn { background: var(--accent); border: none; border-radius: 6px; padding: 6px 12px; color: #fff; font-weight: 600; font-size: 0.8em; cursor: pointer; white-space: nowrap; }
.add-btn:hover { background: var(--accent2); }

/* Activity log */
.log-item { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.75em; display: flex; justify-content: space-between; gap: 8px; }
.log-action { color: var(--text2); }
.log-time { color: var(--text3); font-family: var(--font-mono); font-size: 0.9em; white-space: nowrap; }

/* Lock Screen */
.lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; padding: 20px; }
.lock-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 360px; text-align: center; }
.lock-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.7; }
.lock-title { font-size: 1.3em; font-weight: 700; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.lock-sub { font-size: 0.78em; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
.lock-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: var(--font-mono); font-size: 0.9em; outline: none; text-align: center; letter-spacing: 2px; margin-bottom: 12px; }
.lock-input:focus { border-color: var(--accent); }
.lock-input::placeholder { color: var(--text3); letter-spacing: 0; }
.lock-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; padding: 12px; color: #fff; font-weight: 600; font-size: 0.9em; cursor: pointer; font-family: var(--font-ui); transition: opacity 0.2s; }
.lock-btn:hover { opacity: 0.9; }
.lock-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.lock-error { color: var(--red); font-size: 0.78em; margin-top: 10px; min-height: 1.2em; }
.lock-footer { margin-top: 16px; font-size: 0.68em; color: var(--text3); }
.lock-link { color: var(--accent); cursor: pointer; text-decoration: underline; }
.lock-link:hover { color: var(--accent2); }

/* App wrapper */
#app-main { display: none; }
#lock-screen { display: block; }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen" class="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">&#128274;</div>
    <div class="lock-title">Sprint Command Center</div>
    <div class="lock-sub" id="lock-subtitle">Masukkan password untuk decrypt data.</div>
    <input type="password" class="lock-input" id="lock-password" placeholder="password" autocomplete="off" onkeydown="if(event.key==='Enter')handleUnlock()">
    <button class="lock-btn" id="lock-btn" onclick="handleUnlock()">Unlock</button>
    <div class="lock-error" id="lock-error"></div>
    <div class="lock-footer">
      <span>AES-256-GCM encrypted</span><br>
      <span id="lock-extra"></span>
    </div>
  </div>
</div>

<!-- MAIN APP (hidden until unlocked) -->
<div id="app-main">

<div class="header">
  <h1>Sprint Command Center</h1>
  <div class="header-sub">
    <span class="save-dot" id="saveDot"></span>
    Sprint Command Center // Q2 2026
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>

<div class="container">
  <div id="panel-situasi" class="panel"></div>
  <div id="panel-proposals" class="panel"></div>
  <div id="panel-sprint" class="panel"></div>
  <div id="panel-learning" class="panel"></div>
  <div id="panel-tracker" class="panel"></div>
</div>

<div class="footer">
  <button class="footer-btn" onclick="resetData()">Reset to Default</button>
  <button class="footer-btn" style="margin-left:6px;" onclick="exportData()">Export JSON</button>
  <button class="footer-btn" style="margin-left:6px;" onclick="document.getElementById('importFile').click()">Import JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  <button class="footer-btn" style="margin-left:6px;" onclick="changePassword()">Change Password</button>
  <button class="footer-btn" style="margin-left:6px;color:var(--red);" onclick="lockApp()">Lock</button>
  <div class="footer-note">AES-256-GCM encrypted · Data never leaves your browser</div>
</div>

</div>

<script>
// ============================================
// CRYPTO LAYER — AES-256-GCM via Web Crypto API
// ============================================
const STORAGE_KEY = 'sprint-cmd-v3';
const SALT_KEY = 'sprint-cmd-v3-salt';
const VERIFY_KEY = 'sprint-cmd-v3-verify';

let CRYPTO_KEY = null; // derived AES key, held in memory only

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encryptData(data, key) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const buf = new Uint8Array(iv.length + ct.byteLength);
  buf.set(iv, 0);
  buf.set(new Uint8Array(ct), iv.length);
  return btoa(String.fromCharCode(...buf));
}

async function decryptData(b64, key) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = raw.slice(0, 12);
  const ct = raw.slice(12);
  const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(dec));
}

function getSalt() {
  let b64 = localStorage.getItem(SALT_KEY);
  if (b64) return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = crypto.getRandomValues(new Uint8Array(16));
  localStorage.setItem(SALT_KEY, btoa(String.fromCharCode(...salt)));
  return salt;
}

function hasExistingData() {
  return !!localStorage.getItem(STORAGE_KEY) && !!localStorage.getItem(VERIFY_KEY);
}

// ============================================
// LOCK SCREEN LOGIC
// ============================================
let isFirstTime = false;
let pendingPassword = null;

function initLockScreen() {
  const el = document.getElementById('lock-screen');
  const sub = document.getElementById('lock-subtitle');
  const extra = document.getElementById('lock-extra');
  const btn = document.getElementById('lock-btn');

  if (!hasExistingData()) {
    isFirstTime = true;
    sub.textContent = 'Pertama kali? Set password. Setelah masuk, import data kamu via JSON.';
    btn.textContent = 'Set Password & Enter';
    extra.innerHTML = '<span class="lock-link" onclick="skipEncryption()">Skip tanpa encryption</span>';
  } else {
    isFirstTime = false;
    sub.textContent = 'Masukkan password untuk decrypt data.';
    btn.textContent = 'Unlock';
    extra.innerHTML = '<span class="lock-link" onclick="nukeAndReset()">Lupa password? Reset semua data</span>';
  }
  document.getElementById('lock-password').focus();
}

async function handleUnlock() {
  const pw = document.getElementById('lock-password').value;
  const errEl = document.getElementById('lock-error');
  errEl.textContent = '';

  if (!pw) { errEl.textContent = 'Password tidak boleh kosong.'; return; }
  if (isFirstTime && !pendingPassword) {
    if (pw.length < 4) { errEl.textContent = 'Minimum 4 karakter.'; return; }
    pendingPassword = pw;
    document.getElementById('lock-password').value = '';
    document.getElementById('lock-subtitle').textContent = 'Konfirmasi password:';
    document.getElementById('lock-btn').textContent = 'Confirm & Enter';
    document.getElementById('lock-password').focus();
    return;
  }
  if (isFirstTime && pendingPassword) {
    if (pw !== pendingPassword) { errEl.textContent = 'Password tidak cocok. Coba lagi.'; pendingPassword = null; initLockScreen(); document.getElementById('lock-password').value = ''; return; }
    await setupNewEncryption(pw);
    return;
  }
  await attemptDecrypt(pw);
}

async function setupNewEncryption(password) {
  const salt = getSalt();
  CRYPTO_KEY = await deriveKey(password, salt);
  D = getDefault();
  const verify = await encryptData({ ok: true }, CRYPTO_KEY);
  localStorage.setItem(VERIFY_KEY, verify);
  await save();
  showApp();
}

async function attemptDecrypt(password) {
  const errEl = document.getElementById('lock-error');
  try {
    const salt = getSalt();
    CRYPTO_KEY = await deriveKey(password, salt);
    const verifyB64 = localStorage.getItem(VERIFY_KEY);
    await decryptData(verifyB64, CRYPTO_KEY);
    const dataB64 = localStorage.getItem(STORAGE_KEY);
    if (dataB64) {
      D = await decryptData(dataB64, CRYPTO_KEY);
      if (!D.v || D.v < 3) D = getDefault();
    } else {
      D = getDefault();
    }
    showApp();
  } catch(e) {
    CRYPTO_KEY = null;
    errEl.textContent = 'Password salah.';
    document.getElementById('lock-password').value = '';
    document.getElementById('lock-password').focus();
  }
}

function skipEncryption() {
  if (!confirm('Data akan disimpan TANPA enkripsi. Lanjut?')) return;
  CRYPTO_KEY = null;
  D = getDefault();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(D));
  showApp();
}

function nukeAndReset() {
  if (!confirm('HAPUS SEMUA DATA dan reset? Ini tidak bisa di-undo.')) return;
  if (!confirm('Yakin? Semua progress akan hilang permanen.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(SALT_KEY);
  localStorage.removeItem(VERIFY_KEY);
  pendingPassword = null;
  document.getElementById('lock-password').value = '';
  initLockScreen();
}

function showApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app-main').style.display = 'block';
  renderAll();
}

function lockApp() {
  CRYPTO_KEY = null;
  D = null;
  document.getElementById('app-main').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('lock-password').value = '';
  document.getElementById('lock-error').textContent = '';
  pendingPassword = null;
  isFirstTime = false;
  initLockScreen();
}

async function changePassword() {
  const newPw = prompt('Set password baru (min 4 karakter):');
  if (!newPw || newPw.length < 4) { alert('Password minimal 4 karakter.'); return; }
  const confirm2 = prompt('Konfirmasi password baru:');
  if (newPw !== confirm2) { alert('Password tidak cocok.'); return; }
  localStorage.removeItem(SALT_KEY);
  const salt = getSalt();
  CRYPTO_KEY = await deriveKey(newPw, salt);
  const verify = await encryptData({ ok: true }, CRYPTO_KEY);
  localStorage.setItem(VERIFY_KEY, verify);
  await save();
  alert('Password berhasil diubah.');
}

// ============================================
// DATA LAYER (encrypted)
// ============================================
const TAG_MAP = {
  'CRITICAL': 'tag-high', 'AI-EXP': 'tag-cyan', 'VISIBILITY': 'tag-low',
  'CAREER': 'tag-low', 'ECOSYSTEM': 'tag-cyan', 'COMPLIANCE': 'tag-medium',
  'GROWTH': 'tag-green', 'MANAGEMENT': 'tag-low',
  'CEO-TRUST': 'tag-high', 'SIDE-PROJECT': 'tag-green'
};
const STATUS_MAP = {
  backlog: { cls: 'tag-muted', label: 'BACKLOG' },
  queued: { cls: 'tag-medium', label: 'QUEUED' },
  in_progress: { cls: 'tag-green', label: 'IN PROGRESS' },
  completed: { cls: 'tag-accent2', label: 'DONE' },
  active: { cls: 'tag-critical', label: 'AKTIF' },
  planned: { cls: 'tag-medium', label: 'PLANNED' },
};
const STATUS_CYCLE = ['backlog','queued','in_progress','completed'];
const TIERS = [
  { num:1, emoji:'🔴', label:'TIER 1 — Critical & Urgent', color:'var(--red)' },
  { num:2, emoji:'🟠', label:'TIER 2 — Operational Excellence', color:'var(--accent)' },
  { num:3, emoji:'🟡', label:'TIER 3 — Strategic Positioning', color:'var(--blue)' },
  { num:4, emoji:'🟣', label:'TIER 4 — Long-term & Growth', color:'var(--purple)' },
];
const SPRINT_COLORS = { active:'var(--red)', planned:'var(--blue)', completed:'var(--green)' };

function getDefault() {
  return {
    v: 3,
    tab: 'situasi',
    sprints: [],
    proposals: [],
    tasks: [],
    checks: [],
    tracks: [],
    strategy: {
      mission: 'Belum di-set. Import data atau isi manual.',
      position: '',
      strengths: '',
      threats: '',
      chains: [],
    },
    log: [],
  };
}

let D;
async function save() {
  const dot = document.getElementById('saveDot');
  if (dot) dot.classList.add('saving');
  try {
    if (CRYPTO_KEY) {
      const encrypted = await encryptData(D, CRYPTO_KEY);
      localStorage.setItem(STORAGE_KEY, encrypted);
    } else {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(D));
    }
  } catch(e) { console.error('Save failed:', e); }
  if (dot) setTimeout(() => dot.classList.remove('saving'), 400);
}
function addLog(action) {
  D.log.unshift({ action, time: new Date().toISOString() });
  if(D.log.length > 50) D.log.length = 50;
}

// ============================================
// RENDER ENGINE
// ============================================
function tag(label, cls) { return `<span class="tag ${cls}">${label}</span>`; }
function statusTag(status, clickable, pid) {
  const s = STATUS_MAP[status] || STATUS_MAP.backlog;
  const extra = clickable ? ` tag-clickable" onclick="cycleStatus('${pid}')"` : '"';
  return `<span class="tag ${s.cls}${extra}>${s.label}</span>`;
}
function pbar(val) { return `<div class="pbar"><div class="pbar-fill" style="width:${Math.max(0,Math.min(100,val))}%"></div></div>`; }
function chk(id, text, on, handler) {
  return `<div class="chk" onclick="${handler}('${id}')"><div class="chk-box ${on?'on':''}"></div><span class="chk-label ${on?'done':''}">${text}</span></div>`;
}

// Tab: Situasi
function renderSituasi() {
  const s = D.strategy;
  return `
    <div class="alert">
      <div class="alert-title">⚠ MISI UTAMA</div>
      <div class="alert-body">${s.mission}</div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Analisis Posisi (Sam Kok)</span>${tag('MODE PERANG','tag-critical')}</div>
      <div style="color:var(--text2);font-size:0.82em;line-height:1.7;margin-bottom:14px;white-space:pre-line">${s.position}</div>
      <div class="grid2">
        <div class="stat-block"><div style="color:var(--green);font-weight:600;font-size:0.82em;margin-bottom:4px">✅ Kekuatan</div><div style="font-size:0.78em;color:var(--text2);line-height:1.6">${s.strengths}</div></div>
        <div class="stat-block"><div style="color:var(--red);font-weight:600;font-size:0.82em;margin-bottom:4px">⚠ Ancaman</div><div style="font-size:0.78em;color:var(--text2);line-height:1.6">${s.threats}</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:14px">Five-Chain Strategy → Sprint</div>
      ${s.chains.map(c => `
        <div style="margin-bottom:12px">
          <div style="display:flex;gap:6px;align-items:baseline;margin-bottom:3px">
            <span style="color:var(--accent);font-weight:700;font-size:0.88em">Chain ${c.n} — ${c.t}</span>
            ${tag(c.s,'tag-accent2')}
          </div>
          <p style="color:var(--text2);font-size:0.82em;line-height:1.6">${c.d}</p>
        </div>
      `).join('')}
    </div>`;
}

// Tab: Proposals
function renderProposals() {
  let html = '<p style="color:var(--text2);font-size:0.82em;margin-bottom:16px">12 sistem ranked by impact × urgency. Tap status untuk cycle.</p>';
  TIERS.forEach(tier => {
    const items = D.proposals.filter(p => p.tier === tier.num);
    html += `<div class="tier-head" style="color:${tier.color};${tier.num>1?'margin-top:20px':''}">${tier.emoji} ${tier.label}</div>`;
    items.forEach(p => {
      const pTasks = D.tasks.filter(t => t.pid === p.id);
      const pChecks = D.checks.filter(c => pTasks.some(t => t.id === c.tid));
      const done = pChecks.filter(c => c.on).length;
      const total = pChecks.length;
      const prog = total > 0 ? Math.round(done/total*100) : 0;
      html += `<div class="prop">
        <span class="prop-num">${String(p.num).padStart(2,'0')}</span>
        <div class="prop-body">
          <div class="prop-title">${p.title}</div>
          <div class="prop-desc">${p.desc}</div>
          <div class="prop-tags">${statusTag(p.status,true,p.id)} ${p.tags.map(t=>tag(t,TAG_MAP[t]||'tag-muted')).join(' ')}</div>
          ${prog > 0 ? `<div style="margin-top:6px">${pbar(prog)}<div class="meta">${prog}%</div></div>` : ''}
        </div>
      </div>`;
    });
  });
  return html;
}

// Tab: Sprint
function renderSprint() {
  return D.sprints.map(s => {
    const tasks = D.tasks.filter(t => t.sid === s.id).sort((a,b) => a.ord - b.ord);
    const bc = SPRINT_COLORS[s.status] || 'var(--blue)';
    return `<div class="card" style="border-left:3px solid ${bc}">
      <div class="card-head"><span class="card-title">Sprint ${s.num} — "${s.title}"</span>${statusTag(s.status,false)}</div>
      <p style="color:var(--text2);font-size:0.78em;line-height:1.5;${tasks.length?'margin-bottom:14px':''}">${s.goal}</p>
      ${tasks.length ? `<div class="tl">${tasks.map(t => `
        <div class="tl-item"><div class="tl-day">${t.day}</div><div class="tl-title">${t.title}</div></div>
      `).join('')}</div>` : ''}
    </div>`;
  }).join('');
}

// Tab: Learning
function renderLearning() {
  let html = '<p style="color:var(--text2);font-size:0.82em;margin-bottom:16px">Learning plan dengan deliverable konkret.</p>';
  D.tracks.forEach(track => {
    const done = track.items.filter(i => i.on).length;
    const total = track.items.length;
    const prog = total > 0 ? Math.round(done/total*100) : 0;
    html += `<div class="card">
      <div class="card-head"><span class="card-title">Track ${track.code}: ${track.title}</span>${tag(track.sprint,'tag-accent')}</div>
      <p style="font-size:0.78em;color:var(--text2);line-height:1.5;margin-bottom:10px">${track.desc}</p>
      ${track.items.map(i => chk(i.id, i.text, i.on, 'toggleLearn')).join('')}
      <div style="margin-top:10px">${pbar(prog)}</div>
      <div class="meta">${prog}% — ${done}/${total}</div>
      <div class="deliv"><b>📦 Deliverable: </b><span>${track.deliv}</span></div>
    </div>`;
  });
  return html;
}

// Tab: Tracker
function renderTracker() {
  const active = D.sprints.find(s => s.status === 'active');
  const sprProps = active ? D.proposals.filter(p => p.sid === active.id) : [];
  let html = `<div class="sec-label">${active ? `Sprint ${active.num} — "${active.title}"` : 'No Active Sprint'}</div>`;

  sprProps.forEach(p => {
    const pTasks = D.tasks.filter(t => t.pid === p.id);
    const pChecks = D.checks.filter(c => pTasks.some(t => t.id === c.tid));
    const done = pChecks.filter(c => c.on).length;
    const total = pChecks.length;
    const prog = total > 0 ? Math.round(done/total*100) : 0;
    html += `<div class="card">
      <div class="card-head"><span class="card-title">#${String(p.num).padStart(2,'0')} ${p.title}</span>${statusTag(p.status,true,p.id)}</div>
      ${pbar(prog)}<div class="meta">${prog}% — ${done}/${total}</div>
      <div style="margin-top:8px">${pChecks.map(c => chk(c.id, c.text, c.on, 'toggleCheck')).join('')}</div>
      <div class="add-row">
        <input class="add-input" id="add-${p.id}" placeholder="+ tambah checklist item..." onkeydown="if(event.key==='Enter')addCheck('${p.id}')">
        <button class="add-btn" onclick="addCheck('${p.id}')">Add</button>
      </div>
    </div>`;
  });

  html += `<div class="sec-label" style="margin-top:20px">Learning Progress</div><div class="grid2">`;
  D.tracks.forEach(track => {
    const done = track.items.filter(i => i.on).length;
    const total = track.items.length;
    const prog = total > 0 ? Math.round(done/total*100) : 0;
    html += `<div class="card" style="margin-bottom:0">
      <div class="stat-label">Track ${track.code}: ${track.title.split(' ').slice(0,2).join(' ')}</div>
      ${pbar(prog)}<div class="meta">${prog}% — ${done}/${total}</div>
    </div>`;
  });
  html += '</div>';

  if (D.log.length > 0) {
    html += `<div class="sec-label" style="margin-top:20px">Activity Log (Recent)</div>`;
    html += D.log.slice(0,10).map(l => {
      const d = new Date(l.time);
      const ts = `${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `<div class="log-item"><span class="log-action">${l.action}</span><span class="log-time">${ts}</span></div>`;
    }).join('');
  }

  return html;
}

// ============================================
// ACTIONS
// ============================================
async function cycleStatus(pid) {
  const p = D.proposals.find(x => x.id === pid);
  if (!p) return;
  const idx = STATUS_CYCLE.indexOf(p.status);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  p.status = next;
  addLog(`#${String(p.num).padStart(2,'0')} ${p.title.split(' ').slice(0,3).join(' ')}… → ${next.toUpperCase()}`);
  await save();
  renderAll();
}

async function toggleCheck(cid) {
  const c = D.checks.find(x => x.id === cid);
  if (!c) return;
  c.on = !c.on;
  await save();
  renderAll();
}

async function toggleLearn(iid) {
  D.tracks.forEach(t => { t.items.forEach(i => { if(i.id === iid) i.on = !i.on; }); });
  await save();
  renderAll();
}

async function addCheck(pid) {
  const input = document.getElementById('add-' + pid);
  const text = input.value.trim();
  if (!text) return;
  const pTasks = D.tasks.filter(t => t.pid === pid);
  const tid = pTasks.length > 0 ? pTasks[0].id : null;
  if (!tid) return;
  const id = 'cx' + Date.now();
  D.checks.push({ id, tid, text, on: false });
  addLog(`Added: "${text.slice(0,30)}…"`);
  await save();
  renderAll();
  // Re-focus input after render
  setTimeout(() => { const el = document.getElementById('add-' + pid); if(el) { el.value = ''; el.focus(); } }, 50);
}

// ============================================
// TAB NAVIGATION
// ============================================
const TABS = [
  { id:'situasi', label:'Situasi' },
  { id:'proposals', label:'Proposals' },
  { id:'sprint', label:'Sprint' },
  { id:'learning', label:'Learning' },
  { id:'tracker', label:'Tracker' },
];

async function switchTab(tabId) {
  D.tab = tabId;
  await save();
  renderTabs();
  renderPanel(tabId);
}

function renderTabs() {
  document.getElementById('tabBar').innerHTML = TABS.map(t =>
    `<button class="tab-btn ${D.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function renderPanel(tabId) {
  TABS.forEach(t => {
    const el = document.getElementById('panel-' + t.id);
    if (t.id === tabId) {
      el.classList.add('active');
      switch(t.id) {
        case 'situasi': el.innerHTML = renderSituasi(); break;
        case 'proposals': el.innerHTML = renderProposals(); break;
        case 'sprint': el.innerHTML = renderSprint(); break;
        case 'learning': el.innerHTML = renderLearning(); break;
        case 'tracker': el.innerHTML = renderTracker(); break;
      }
    } else {
      el.classList.remove('active');
    }
  });
}

function renderAll() {
  renderTabs();
  renderPanel(D.tab);
}

// ============================================
// IMPORT / EXPORT / RESET
// ============================================
async function resetData() {
  if (!confirm('Reset semua data ke default? Semua progress akan hilang.')) return;
  D = getDefault();
  await save();
  renderAll();
}

function exportData() {
  const blob = new Blob([JSON.stringify(D, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sprint-cmd-v3-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.v) { alert('Format tidak valid.'); return; }
      D = imported;
      await save();
      renderAll();
      alert('Data imported & encrypted!');
    } catch(err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============================================
// BOOT — show lock screen first
// ============================================
initLockScreen();
</script>
</body>
</html>
